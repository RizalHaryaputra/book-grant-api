openapi: 3.0.0
info:
  title: API Contract - Sistem Penulisan Hibah Buku (Full Project)
  description: |
    API Master Contract for all 4 modules in the Book Grant Writing System.
    (Kontrak Master API untuk ke-4 modul pada Sistem Penulisan Hibah Buku.)
    
    Termasuk: Modul 1 Fondasi Sistem, User, Role & Kontrak (Kelompok 4)
    Modul 2 Penulis & Manajemen Naskah (Kelompok 3)
    Modul 3 Reviewer & Proses Review (Kelompok 2)
    Modul 4 Penerbit, Pra-Cetak & Monitoring (Kelompok 1)
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local Development Server / Server Pengembangan Lokal

tags:
  - name: Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
    description: Login, role access, master data, akun, upload kontrak, validasi kontrak.
  - name: Modul 2 - Penulis & Manajemen Naskah (Kelompok 3)
    description: Dashboard penulis, unggah draft awal, revisi naskah, dokumen administrasi.
  - name: Modul 3 - Reviewer & Proses Review (Kelompok 2)
    description: Plotting reviewer, assignment, penilaian rubrik, feedback, status review.
  - name: Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
    description: Validasi pra-cetak, keputusan penerbit, reminder email, dashboard sistem.

paths:
  # ==========================================
  # MODUL 1: FONDASI SISTEM & KONTRAK (KLP 4) - DENGAN AUTO GENERATE AKUN
  # ==========================================
  /auth/login:
    post:
      summary: Login Pengguna
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login berhasil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Login berhasil." }
                  data:
                    type: object
                    properties:
                      token: { type: string }
                      user: { $ref: '#/components/schemas/User' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      summary: Logout Pengguna
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout berhasil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/me:
    get:
      summary: Data User yang Sedang Login
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data user berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/User' }

  # -------------------- ADMIN USER MANAGEMENT --------------------
  /admin/users:
    get:
      summary: Daftar Semua User (Admin)
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, penulis, reviewer, penerbit]
      responses:
        '200':
          description: Daftar user berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/User' } }
    post:
      summary: Buat Akun Baru (Manual oleh Admin)
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, role, password]
              properties:
                name: { type: string }
                email: { type: string }
                role: { type: string, enum: [admin, penulis, reviewer, penerbit] }
                password: { type: string }
                is_active: { type: boolean, default: true }
      responses:
        '201':
          description: Akun berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'

  /admin/users/{id}:
    put:
      summary: Update Data User
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                is_active: { type: boolean }
                password: { type: string }
                role_id: { type: integer }
      responses:
        '200': { description: User berhasil diupdate. }
    delete:
      summary: Hapus User (Soft delete)
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: User dinonaktifkan. }

  # -------------------- FORM KESEDIAAN + AUTO CREATE ACCOUNT (CORE CHANGE) --------------------
  /author-confirmations:
    post:
      summary: Submit Form Kesediaan Penulis (Calon Penulis)
      description: |
        **Endpoint publik (tanpa login).**  
        Setelah data disimpan ke tabel `author_profiles`, sistem **otomatis**:
        1. Membuat akun penulis di tabel `users` dengan role `penulis`.
        2. Menghasilkan password acak (8 karakter alfanumerik).
        3. Menyimpan `user_id` yang baru dibuat ke `author_profiles`.
        4. Memanggil endpoint `/notification/send` (Modul 4) untuk mengirim email berisi username (email) dan password ke penulis.
        5. Mengubah status author menjadi `account_created`.

        **Catatan:** Proses ini bersifat atomik; jika gagal di tengah, semua perubahan dibatalkan (rollback).
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, institution, book_title, book_type]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                institution: { type: string }
                book_title: { type: string }
                book_type: { type: string, enum: [buku ajar, buku referensi] }
                ai_ethics_agreed: { type: boolean, default: true }
                willingness_statement: { type: boolean, default: true, description: "Pernyataan kesediaan mengikuti proses hibah" }
      responses:
        '201':
          description: Form kesediaan diproses, akun penulis berhasil dibuat, dan email dikirim.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Akun penulis berhasil dibuat. Email kredensial telah dikirim." }
                  data:
                    type: object
                    properties:
                      author_id: { type: integer }
                      user_id: { type: integer }
                      status: { type: string, example: "account_created" }
        '202':
          description: Data tersimpan, tetapi email gagal dikirim (misal modul 4 tidak merespon). Akun tetap dibuat, perlu resend email via admin.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  message: { type: string, example: "Akun dibuat, namun email gagal terkirim. Silakan hubungi admin untuk resend." }
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      summary: Daftar Form Kesediaan (Admin)
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [registered, account_created, contract_uploaded, contract_validated, contract_rejected]
      responses:
        '200':
          description: Daftar author profiles berhasil diambil (dengan join user untuk name/email).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Author' } }

  # -------------------- ADMIN RESEND AKUN (jika email gagal) --------------------
  /admin/authors/{authorId}/resend-credentials:
    post:
      summary: Resend Credentials Email ke Penulis (Admin)
      description: |
        Admin dapat memanggil endpoint ini jika penulis tidak menerima email kredensial saat pendaftaran otomatis.
        Sistem akan generate ulang password baru, update di database, dan kirim email baru.
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: authorId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Email kredensial berhasil dikirim ulang.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # -------------------- AUTHOR PROFILE & CO-AUTHOR --------------------
  /authors/{id}:
    get:
      summary: Get Author Profile by ID
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Data author berhasil diambil (termasuk name dan email dari user).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Author' }
    put:
      summary: Update Author Profile
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                institution: { type: string }
                book_title: { type: string }
                book_type: { type: string, enum: [buku ajar, buku referensi] }
                ai_ethics_agreed: { type: boolean }
                willingness_statement: { type: boolean }
      responses:
        '200': { description: Author profile berhasil diupdate. }

  /authors/{authorId}/co-authors:
    get:
      summary: Get Co-Authors
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: authorId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Daftar co-author berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/CoAuthor' } }
    post:
      summary: Add Co-Author
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: authorId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                is_mandatory: { type: boolean, default: false }
                sort_order: { type: integer }
      responses:
        '201': { description: Co-author berhasil ditambahkan. }
    put:
      summary: Update Co-Author
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      parameters:
        - name: authorId
          in: path
          required: true
        - name: coAuthorId
          in: query
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                is_mandatory: { type: boolean }
                sort_order: { type: integer }
      responses:
        '200': { description: Co-author berhasil diupdate. }
    delete:
      summary: Remove Co-Author
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      parameters:
        - name: authorId
          in: path
          required: true
        - name: coAuthorId
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Co-author berhasil dihapus. }

  # -------------------- KONTRAK (TANPA CONTRACT_NUMBER) --------------------
  /contracts:
    post:
      summary: Upload Contract (Penulis)
      description: Mengunggah file kontrak (PDF) untuk author profile yang sudah memiliki akun.
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [author_profile_id, file]
              properties:
                author_profile_id: { type: integer }
                file: { type: string, format: binary, description: "File kontrak (PDF)" }
      responses:
        '201':
          description: Kontrak berhasil diupload. Status author berubah menjadi `contract_uploaded`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'

  /contracts/{contractId}:
    get:
      summary: Get Contract Detail
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: contractId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Data kontrak berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Contract' }
    put:
      summary: Update Contract (Revisi)
      description: Mengganti file kontrak yang sudah diupload sebelumnya.
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: contractId
          in: path
          required: true
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary, description: "File kontrak baru (PDF)" }
      responses:
        '200': { description: Kontrak berhasil diupdate. }
    patch:
      summary: Validate or Reject Contract (Admin)
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: contractId
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [validated, rejected, revision] }
                rejection_reason: { type: string }
      responses:
        '200':
          description: |
            - Jika status `validated`, status author berubah menjadi `contract_validated` dan penulis menerima notifikasi untuk upload draft awal.
            - Jika `rejected`, status author menjadi `contract_rejected`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'

  /admin/contracts:
    get:
      summary: List All Contracts (Admin)
      tags:
        - Modul 1 - Fondasi Sistem & Kontrak (Kelompok 4)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [uploaded, validated, rejected, revision] }
      responses:
        '200':
          description: Daftar kontrak berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Contract' } }

  # ==========================================
  # MODUL 2: PENULIS & MANAJEMEN NASKAH (KLP 3)
  # ==========================================
  /author/dashboard:
    get:
      summary: Author Dashboard (Dasbor Penulis)
      description: Mengambil informasi lengkap terkait performa naskah aktif penulis beserta riwayat pengajuan naskah sebelumnya.
      tags:
        - Modul 2 - Penulis & Manajemen Naskah (Kelompok 3)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data dasbor berhasil diambil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorDashboardResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /author/manuscripts/drafts:
    post:
      summary: Upload Initial Draft (Unggah Draft Awal)
      description: Mengunggah file draft naskah baru untuk pertama kalinya ke dalam sistem beserta pengisian data kelengkapan atribut buku.
      tags:
        - Modul 2 - Penulis & Manajemen Naskah (Kelompok 3)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file_draft
                - title
                - book_type
                - abstract
                - total_pages
                - category
              properties:
                file_draft:
                  type: string
                  format: binary
                  description: Berkas naskah bertipe PDF atau DOCX.
                title:
                  type: string
                  example: "Pengantar Sistem Cerdas"
                book_type:
                  type: string
                  enum: [ajar, referensi]
                  example: "ajar"
                abstract:
                  type: string
                  example: "Buku ini membahas konsep dasar rekayasa kecerdasan komputasional..."
                total_pages:
                  type: integer
                  example: 150
                category:
                  type: string
                  example: "Teknologi Informasi"
      responses:
        '201':
          description: Draft awal berhasil diunggah.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManuscriptResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /author/manuscripts/{manuscriptId}/metadata:
    put:
      summary: Update Manuscript Metadata (Perbarui Metadata Naskah)
      description: Memperbarui data tekstual atribut buku seperti perubahan judul, abstrak, ataupun kategori keilmuan naskah.
      tags:
        - Modul 2 - Penulis & Manajemen Naskah (Kelompok 3)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
          description: ID unik naskah yang ingin diubah metadatanya.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "Pengantar Sistem Cerdas Edisi Revisi"
                abstract:
                  type: string
                  example: "Pembaruan materi fokus pada arsitektur neural network modern..."
                category:
                  type: string
                  example: "Kecerdasan Buatan"
      responses:
        '200':
          description: Metadata berhasil diperbarui.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManuscriptResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /author/manuscripts/{manuscriptId}/reviews:
    get:
      summary: Get Manuscript Reviews (Lihat Hasil Review)
      description: Mengambil seluruh rincian hasil penilaian kriteria rubrik beserta komentar evaluasi yang ditulis oleh peninjau (reviewer).
      tags:
        - Modul 2 - Penulis & Manajemen Naskah (Kelompok 3)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
          description: ID unik naskah yang ingin dilihat hasil review-nya.
      responses:
        '200':
          description: Hasil review berhasil diambil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManuscriptReviewListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /author/manuscripts/{manuscriptId}/revisions:
    post:
      summary: Upload Revision (Unggah Revisi Naskah)
      description: Mengunggah berkas naskah versi terbaru yang telah diperbaiki oleh penulis berdasarkan hasil evaluasi tim reviewer.
      tags:
        - Modul 2 - Penulis & Manajemen Naskah (Kelompok 3)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
          description: ID naskah yang dituju untuk pengunggahan berkas revisinya.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file_revision
              properties:
                file_revision:
                  type: string
                  format: binary
                  description: Berkas naskah revisi terbaru (PDF/DOCX).
                revision_note:
                  type: string
                  example: "Telah memperbaiki format sitasi penulisan pustaka pada Bab 2."
      responses:
        '201':
          description: Revisi naskah berhasil diunggah.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManuscriptResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /author/manuscripts/{manuscriptId}/documents:
    post:
      summary: Upload Administrative Document (Unggah Dokumen Administrasi)
      description: Mengunggah berkas-berkas administratif kelengkapan tahap pra-cetak, seperti surat pernyataan keaslian naskah atau lembar bermeterai.
      tags:
        - Modul 2 - Penulis & Manajemen Naskah (Kelompok 3)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
          description: ID naskah terkait kelengkapan dokumen penunjang ini.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - document_file
                - document_type
              properties:
                document_file:
                  type: string
                  format: binary
                  description: Berkas dokumen pendukung (PDF/JPG/PNG) maksimal 5MB.
                document_type:
                  type: string
                  enum:
                    - surat_pernyataan
                    - scan_bermeterai
                  example: "surat_pernyataan"
      responses:
        '201':
          description: Dokumen administrasi berhasil diunggah.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorDocumentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ==========================================
  # MODUL 3: REVIEWER & PROSES REVIEW (KLP 2)
  # ==========================================
  /admin/manuscripts/unassigned:
    get:
      summary: Get Unassigned Manuscripts (Dapatkan Naskah Belum Diplot)
      tags:
        - Modul 3 - Reviewer & Proses Review (Kelompok 2)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Daftar naskah belum diplot berhasil diambil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseList'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /admin/manuscripts/{manuscriptId}/assign-reviewer:
    post:
      summary: Assign Reviewer to Manuscript (Tugaskan Reviewer pada Naskah)
      tags:
        - Modul 3 - Reviewer & Proses Review (Kelompok 2)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reviewer_id
                - deadline
              properties:
                reviewer_id:
                  type: integer
                  example: 5
                deadline:
                  type: string
                  format: date
                  example: "2026-05-20"
      responses:
        '200':
          description: Reviewer berhasil ditugaskan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /reviewer/dashboard:
    get:
      summary: Reviewer Dashboard (Dasbor Reviewer)
      tags:
        - Modul 3 - Reviewer & Proses Review (Kelompok 2)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data dasbor berhasil diambil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseList'

  /reviewer/manuscripts/{manuscriptId}:
    get:
      summary: Get Manuscript Details for Review (Dapatkan Detail Naskah untuk Direview)
      tags:
        - Modul 3 - Reviewer & Proses Review (Kelompok 2)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detail naskah berhasil diambil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /reviewer/manuscripts/{manuscriptId}/rubric:
    get:
      summary: Get Review Rubric (Dapatkan Rubrik Penilaian)
      tags:
        - Modul 3 - Reviewer & Proses Review (Kelompok 2)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Rubrik berhasil diambil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseList'

  /reviewer/manuscripts/{manuscriptId}/review:
    post:
      summary: Submit Review Result (Kirim Hasil Review)
      tags:
        - Modul 3 - Reviewer & Proses Review (Kelompok 2)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rubric_scores
                - narrative_feedback
              properties:
                rubric_scores:
                  type: array
                  items:
                    type: object
                    required:
                      - criteria_id
                      - score
                    properties:
                      criteria_id:
                        type: integer
                        example: 1
                      score:
                        type: integer
                        example: 85
                narrative_feedback:
                  type: string
                  example: "Secara keseluruhan bagus, namun bab 2 perlu referensi terbaru."
      responses:
        '200':
          description: Review berhasil dikirim.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'

  /manuscripts/{manuscriptId}/compiled-reviews:
    get:
      summary: Get Compiled Reviews (Dapatkan Kompilasi Review)
      tags:
        - Modul 3 - Reviewer & Proses Review (Kelompok 2)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Kompilasi review berhasil diambil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'

  # ==========================================
  # MODUL 4: PENERBIT, PRA-CETAK & MONITORING (KLP 1)
  # ==========================================
  /publisher/dashboard:
    get:
      summary: Publisher Dashboard (Dasbor Penerbit)
      description: |
        Menampilkan ringkasan tugas penerbit:
        - jumlah naskah pra-cetak
        - jumlah approved bulan ini
        - jumlah revised bulan ini
        - daftar 5 naskah pra-cetak terbaru
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data dashboard penerbit berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      preprint_count:
                        type: integer
                      approved_count_this_month:
                        type: integer
                      revised_count_this_month:
                        type: integer
                      latest_preprints:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            title:
                              type: string
                            author:
                              type: string
                            submitted_at:
                              type: string
                              format: date-time
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /publisher/preprint-list:
    get:
      summary: Get Preprint Manuscripts List (Daftar Naskah Pra-Cetak)
      description: Mengembalikan daftar naskah status `preprint` dengan pagination.
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: kelengkapan
          in: query
          schema:
            type: string
            enum: [pending, partial, complete]
      responses:
        '200':
          description: Daftar naskah pra-cetak berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            title:
                              type: string
                            author_name:
                              type: string
                            submitted_at:
                              type: string
                            cover_checked:
                              type: boolean
                            pages_checked:
                              type: boolean
                            admin_checked:
                              type: boolean
                      pagination:
                        type: object
                        properties:
                          page:
                            type: integer
                          limit:
                            type: integer
                          total:
                            type: integer
                          total_pages:
                            type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /publisher/check/{manuscriptId}:
    get:
      summary: Get Preprint Check Data (Ambil Data Pemeriksaan Pra-Cetak)
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Data pemeriksaan berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      manuscript:
                        type: object
                        properties:
                          id:
                            type: integer
                          title:
                            type: string
                          author_name:
                            type: string
                          cover_file_url:
                            type: string
                          page_count:
                            type: integer
                          admin_documents:
                            type: array
                            items:
                              type: object
                      check_result:
                        type: object
                        nullable: true
                        properties:
                          cover_ok:
                            type: boolean
                          pages_ok:
                            type: boolean
                          admin_ok:
                            type: boolean
                          notes:
                            type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    post:
      summary: Save Preprint Check (Simpan Hasil Pemeriksaan Pra-Cetak)
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      parameters:
        - name: manuscriptId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cover_ok
                - pages_ok
                - admin_ok
              properties:
                cover_ok:
                  type: boolean
                pages_ok:
                  type: boolean
                admin_ok:
                  type: boolean
                notes:
                  type: string
      responses:
        '200':
          description: Pemeriksaan berhasil disimpan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /publisher/decision:
    post:
      summary: Publisher Decision (Keputusan Penerbit)
      description: |
        Memberikan keputusan akhir penerbit: approved atau revised.
        Jika revised, wajib menyertakan revision_notes.
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - manuscript_id
                - decision
              properties:
                manuscript_id:
                  type: integer
                decision:
                  type: string
                  enum: [approved, revised]
                revision_notes:
                  type: string
      responses:
        '200':
          description: Keputusan berhasil disimpan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'
        '400':
          description: Bad request
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /admin/dashboard-stats:
    get:
      summary: Admin Dashboard Statistics (Statistik Dasbor Admin)
      description: |
        Ringkasan statistik untuk admin: jumlah penulis, kontrak valid,
        draft masuk, review berjalan, revisi, pra-cetak, siap cetak.
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statistik berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total_penulis:
                        type: integer
                      total_kontrak_valid:
                        type: integer
                      total_draft_masuk:
                        type: integer
                      total_review_berjalan:
                        type: integer
                      total_revisi:
                        type: integer
                      total_pracetak:
                        type: integer
                      total_siap_cetak:
                        type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /admin/notification-logs:
    get:
      summary: Get Notification Logs (Log Notifikasi Email)
      description: Admin melihat riwayat pengiriman email dengan filter dan pagination.
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: type
          in: query
          schema:
            type: string
            enum: [akun, kontrak, upload_draft, plotting, hasil_review, pracetak, approved, revised, reminder]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, sent, failed]
      responses:
        '200':
          description: Log notifikasi berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            recipient:
                              type: string
                            subject:
                              type: string
                            type:
                              type: string
                            status:
                              type: string
                            sent_at:
                              type: string
                            created_at:
                              type: string
                      pagination:
                        type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /notification/send:
    post:
      summary: Send Email Notification (Kirim Notifikasi Email)
      description: Endpoint internal untuk mengirim email, dipanggil oleh modul lain.
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - to
                - subject
                - body
                - type
              properties:
                to:
                  type: string
                  format: email
                subject:
                  type: string
                body:
                  type: string
                type:
                  type: string
                  enum: [akun, kontrak, upload_draft, plotting, hasil_review, pracetak, approved, revised, reminder]
      responses:
        '200':
          description: Email berhasil dikirim.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseObject'
        '400':
          description: Data tidak valid
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /reminder/trigger:
    post:
      summary: Trigger Reminder Manually (Trigger Reminder Manual)
      description: Menjalankan cron reminder secara manual (cek deadline H-3 s.d. H).
      tags:
        - Modul 4 - Penerbit, Pra-Cetak, & Monitoring (Kelompok 1)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reminder berhasil diproses.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      reminders_sent:
                        type: integer
                      reminders_failed:
                        type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

# ==============================================================
# COMPONENTS
# ==============================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token dari Laravel Sanctum.

  parameters:
    manuscriptId:
      name: manuscriptId
      in: path
      required: true
      schema:
        type: integer
      description: The ID of the manuscript. (ID dari naskah.)

  schemas:

    # ── Reusable wrappers ──────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operasi berhasil."
        data:
          nullable: true
          example: null

    SuccessResponseObject:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Data berhasil diambil."
        data:
          type: object

    SuccessResponseList:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Daftar berhasil diambil."
        data:
          type: array
          items:
            type: object

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Data tidak valid."
        data:
          type: object
          properties:
            errors:
              type: object
              example:
                email: ["Email sudah terdaftar."]

    # ── Modul 1 schemas ────────────────────────────────────────
    Role:
      type: object
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          enum: [admin, penulis, reviewer, penerbit]
          example: penulis

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Dr. Budi Santoso"
        email:
          type: string
          format: email
          example: "budi@uny.ac.id"
        is_active:
          type: boolean
          example: true
        role:
          $ref: '#/components/schemas/Role'
        created_at:
          type: string
          format: date-time
          example: "2026-05-01T08:00:00Z"

    AuthorConfirmation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Dr. Budi Santoso, M.Kom."
        email:
          type: string
          format: email
          example: "budi@uny.ac.id"
        institution:
          type: string
          example: "Universitas Negeri Yogyakarta"
        book_title:
          type: string
          example: "Pengantar Ilmu Komputer untuk Perguruan Tinggi"
        book_type:
          type: string
          enum: [ajar, referensi]
          example: ajar
        status:
          type: string
          enum: [pending, processed]
          example: pending
        created_at:
          type: string
          format: date-time
          example: "2026-05-01T08:00:00Z"

    Contract:
      type: object
      properties:
        id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 3
        file_url:
          type: string
          description: URL untuk mengakses/mengunduh file PDF kontrak.
          example: "http://localhost:8000/storage/contracts/kontrak_budi_2026.pdf"
        status:
          type: string
          enum: [contract_uploaded, contract_validated, contract_rejected]
          example: contract_uploaded
        rejection_reason:
          type: string
          nullable: true
          description: Alasan penolakan kontrak oleh admin (jika ditolak).
          example: null
        validated_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2026-05-01T09:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-01T09:00:00Z"

    # ── Modul 2 Entities (Kelompok 3) ──────────────────────────
    Manuscript:
      type: object
      properties:
        id:
          type: integer
          example: 101
        title:
          type: string
          example: "Pengantar Sistem Cerdas"
        book_type:
          type: string
          example: "ajar"
        abstract:
          type: string
          example: "Buku ini membahas konsep dasar rekayasa kecerdasan komputasional..."
        total_pages:
          type: integer
          example: 150
        category:
          type: string
          example: "Teknologi Informasi"
        status:
          type: string
          example: "initial_draft_uploaded"
        file_url:
          type: string
          example: "http://localhost:8000/storage/manuscripts/drafts/101_v1.pdf"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AuthorDashboardData:
      type: object
      properties:
        author_name:
          type: string
          example: "Dr. Budi Santoso, M.Kom."
        active_manuscript:
          $ref: '#/components/schemas/Manuscript'
        history:
          type: array
          items:
            $ref: '#/components/schemas/Manuscript'

    ReviewComment:
      type: object
      properties:
        reviewer_alias:
          type: string
          example: "Reviewer 1"
        score:
          type: integer
          example: 85
        feedback:
          type: string
          example: "Secara keseluruhan bagus, namun bab 2 perlu referensi terbaru."

    AuthorDocumentData:
      type: object
      properties:
        id:
          type: integer
          example: 50
        manuscript_id:
          type: integer
          example: 101
        document_type:
          type: string
          example: "surat_pernyataan"
        file_url:
          type: string
          example: "http://localhost:8000/storage/documents/surat_pernyataan_101.pdf"

    # ── Modul 2 Wrapped Responses (Kelompok 3) ──────────────────
    AuthorDashboardResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Data dasbor berhasil diambil."
        data:
          $ref: '#/components/schemas/AuthorDashboardData'

    ManuscriptResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operasi manuskrip berhasil dilakukan."
        data:
          $ref: '#/components/schemas/Manuscript'

    ManuscriptReviewListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Hasil review berhasil diambil."
        data:
          type: array
          items:
            $ref: '#/components/schemas/ReviewComment'

    AuthorDocumentResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Dokumen administrasi berhasil diunggah."
        data:
          $ref: '#/components/schemas/AuthorDocumentData'

  responses:
    UnauthorizedError:
      description: Tidak terautentikasi. Token tidak ada atau tidak valid.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Unauthenticated."
              data:
                nullable: true
                example: null

    ForbiddenError:
      description: Akses ditolak. Role tidak memiliki izin.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Akses ditolak."
              data:
                nullable: true
                example: null

    NotFoundError:
      description: Data tidak ditemukan.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Resource not found."
              data:
                nullable: true
                example: null

    ValidationError:
      description: Validasi input gagal.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'